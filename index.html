<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="src/output.css" rel="stylesheet">
</head>
</head>
<body class="bg-slate-900 text-white flex min-h-screen items-center justify-center font-sans">

    <!-- GAME CARD CONTAINER -->
    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl max-w-sm w-full mx-4 flex flex-col gap-4 text-center">
        
        <!-- STEP 1: PLAYER 1 NAME -->
        <div id="step1" class="flex flex-col gap-4">
            <h1 class="text-2xl font-bold">Player One Setup</h1>
            <input id="p1Name" type="text" placeholder="Enter your name" class="w-full rounded-lg bg-slate-700 px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="submitP1Name()" class="w-full rounded-lg bg-blue-600 py-2 font-semibold hover:bg-blue-500 active:scale-95 transition-all">Next</button>
        </div>

        <!-- STEP 2: PLAYER 1 SECRET NUMBER -->
        <div id="step2" class="hidden flex flex-col gap-4">
            <h1 id="p1Greeting" class="text-xl font-bold text-blue-400"></h1>
            <p class="text-slate-400 text-sm">Enter a secret number for Player 2 to guess:</p>
            <input id="secretNum" type="number" placeholder="Secret Number" class="w-full rounded-lg bg-slate-700 px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="submitSecretNumber()" class="w-full rounded-lg bg-blue-600 py-2 font-semibold hover:bg-blue-500 active:scale-95 transition-all">Lock Number</button>
        </div>

        <!-- STEP 3: PLAYER 2 NAME -->
        <div id="step3" class="hidden flex flex-col gap-4">
            <h1 class="text-2xl font-bold text-emerald-400">Player Two Setup</h1>
            <input id="p2Name" type="text" placeholder="Enter your name" class="w-full rounded-lg bg-slate-700 px-4 py-2 outline-none focus:ring-2 focus:ring-emerald-500">
            <button onclick="submitP2Name()" class="w-full rounded-lg bg-emerald-600 py-2 font-semibold hover:bg-emerald-500 active:scale-95 transition-all">Start Guessing</button>
        </div>

        <!-- STEP 4: THE GUESSING GAME -->
        <div id="step4" class="hidden flex flex-col gap-4">
            <h1 id="p2Greeting" class="text-xl font-bold text-emerald-400"></h1>
            <p id="chancesText" class="text-amber-400 font-medium">Chances left: 3</p>
            <input id="guessInput" type="number" placeholder="Take a guess" class="w-full rounded-lg bg-slate-700 px-4 py-2 outline-none focus:ring-2 focus:ring-emerald-500">
            <button id="guessBtn" onclick="checkGuess()" class="w-full rounded-lg bg-emerald-600 py-2 font-semibold hover:bg-emerald-500 active:scale-95 transition-all">Submit Guess</button>
            
            <!-- FEEDBACK MESSAGE -->
            <p id="feedback" class="text-lg font-bold mt-2 hidden"></p>
        </div>

    </div>
    <script src="Script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 34 HW</title>
    <link rel="stylesheet" href="src/output.css">
</head>
<body class="bg-black text-white container mx-auto items-center justify-center flex flex-col h-screen">
<!-- First UI -->
    <div class="FirstUI ">
        <h1 class=" text-white text-4xl font-bold mb-6">Guess the Number Game</h1>
        <div class="bg-white gap-4 p-6 rounded-xl w-full max-w-sm border border-black shadow-sm flex flex-col items-center justify-center">
            <h2 class="FirstHeading text-blue-500 text-4xl font-bold mb-6">Player One</h2>
            <div class="flex flex-col items-center gap-4 w-full max-w-xs"> 
                <input class="FirstInput w-full px-4 py-3 rounded-xl border border-gray-200 outline-none text-gray-700 placeholder-gray-400 text-lg shadow-sm" type="text" placeholder="Enter Your name">
                <button class="FirstBtn w-full bg-[#0033ff] text-white font-semibold py-3 px-6 rounded-xl text-lg hover:bg-opacity-90 transition duration-200">Enter</button>    
            </div>
        </div>
    </div>
<!-- First UI -->
<!-- secound UI  -->
    <div class="SecondUI hidden  ">
        <h1 class=" text-white text-4xl font-bold mb-6">Guess the Number Game</h1>

            <h2 class="SecondHeading text-black text-4xl font-bold mb-6"></h2>
            <div class="flex flex-col items-center gap-4 w-full max-w-xs"> 
                <input class="SecondInput w-full px-4 py-3 rounded-xl border border-gray-200 outline-none text-gray-700 placeholder-gray-400 text-lg shadow-sm" type="number" placeholder="Enter your number">
                <button class="SecondBtn w-full bg-[#0c1020] text-white font-semibold py-3 px-6 rounded-xl text-lg hover:bg-opacity-90 transition duration-200">Confirm</button>    
            </div>
        </div>
    </div>
<!-- secound UI  -->
<!-- third UI -->

            <h2 class="ThirdHeading text-red-700 text-4xl font-bold mb-6">Player Two</h2>

                <button class="ThirdBtn w-full bg-[#ff0000] text-white font-semibold py-3 px-6 rounded-xl text-lg hover:bg-opacity-90 transition duration-200">Enter</button>

<!-- third UI -->

            </div>
